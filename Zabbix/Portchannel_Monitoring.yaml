                  error_handler: CUSTOM_VALUE
                  error_handler_params: '0'
            - uuid: 2c3d4e5f6a7b4c8d9e0f1a2b3c4d5e6f
              name: 'PortChannel operKey (fallback membership) ifIndex {#SNMPINDEX}'
              type: SNMP_AGENT
              key: 'lacp.member.aggkey.trunk[{#SNMPINDEX}]'
              delay: 5m
              value_type: UNSIGNED
              snmp_oid: '1.2.840.10006.300.43.1.2.1.1.4.{#SNMPINDEX}'
              preprocessing:
                - type: REGEX
                  parameters:
                    - '^(\\d+)$'
                    - '\\1'
                  error_handler: CUSTOM_VALUE
                  error_handler_params: '0'
            - uuid: d2a103b0df6e4da1b0640621f6bd1fff
              name: 'ifOperStatus ifIndex {#SNMPINDEX} (trunk)'
              type: SNMP_AGENT
              key: 'ifOperStatus.trunk[{#SNMPINDEX}]'
              snmp_oid: '1.3.6.1.2.1.2.2.1.8.{#SNMPINDEX}'
              delay: 60s
              valuemap:
                name: IF-MIB::ifOperStatus
              tags:
                - tag: Interface
                  value: '{#SNMPINDEX}'
                - tag: Role
                  value: trunk
          trigger_prototypes:
            - uuid: 5a95f773c32242df8b705f8b3d72e8c1
              name: 'Interface ifIndex {#SNMPINDEX} Down - trunk'
              expression: 'last(/Template Cisco PortChannel Member Monitoring/ifName.trunk[{#SNMPINDEX}])<>"" and (min(/Template Cisco PortChannel Member Monitoring/ifOperStatus.trunk[{#SNMPINDEX}],{$LINK.DOWN.DURATION})=2 or min(/Template Cisco PortChannel Member Monitoring/ifOperStatus.trunk[{#SNMPINDEX}],{$LINK.DOWN.DURATION})=7) and last(/Template Cisco PortChannel Member Monitoring/lacp.member.poifindex.trunk[{#SNMPINDEX}])=0 and last(/Template Cisco PortChannel Member Monitoring/lacp.member.aggkey.trunk[{#SNMPINDEX}])=0'
              event_name: '{HOST.HOST} Interface {ITEM.LASTVALUE1} down - trunk'
              priority: AVERAGE
              manual_close: 'NO'
              tags:
