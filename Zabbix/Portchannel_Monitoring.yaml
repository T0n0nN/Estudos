        - uuid: 3d2c1b0a9f8e4d7c8b6a5f4e3d2c1b0a
          name: EtherChannel member port discovery (mode on via SSH)
          type: DEPENDENT
          key: etherchannel.modeon.member.discovery
          delay: '0'
          lifetime: 30d
          enabled_lifetime: 30d
          description: |
            Discovers EtherChannel members for static mode (Protocol "-") from
            "show etherchannel summary" (SSH).

            Important: handles wrapped port lists (members on the next line), e.g.:
              Po72(SU)  -  Gi1/4/0/5(P) Gi1/4/0/19(P)
                           Gi2/4/0/19(D)
          master_item:
            key: 'ssh.run[etherchannel.summary,{HOST.CONN},{$SSH.PORT},utf8]'
          preprocessing:
            - type: JAVASCRIPT
              parameters:
                - |
                  // Input: raw output of "show etherchannel summary".
                  // Output: discovery JSON {"data":[{"{#PO}":"Po72","{#IFNAME}":"Gi2/4/0/19"}, ...]}
                  // Notes:
                  // - Supports wrapped member lists (continuation lines).
                  // - Discovers only Protocol "-" (static/mode on).

                  function trim(s) { return (s == null) ? '' : String(s).replace(/^\s+|\s+$/g, ''); }

                  var text = value || '';
                  var lines = text.split(/\r?\n/);

                  var data = [];
                  var seen = {};

                  var currentPo = null;
                  var currentFlags = '';
                  var currentProtocol = null;

                  function addMember(po, ifname) {
                    if (!po || !ifname) return;
                    // Keep only physical-ish interface names (avoid Po tokens).
                    if (String(ifname).indexOf('/') === -1) return;
                    var k = po + '|' + ifname;
                    if (seen[k]) return;
                    seen[k] = true;
                    data.push({"{#PO}": po, "{#IFNAME}": ifname});
                  }

                  // Example new group line:
                  // 72     Po72(SU)         -          Gi1/4/0/5(P)    Gi1/4/0/19(P)
                  var reGroup = /^\s*(\d+)\s+Po(\d+)\(([^)]*)\)\s+(\S+)\s+(.*)$/;
                  // Example continuation line:
                  //        Gi2/4/0/19(D)
                  var rePortToken = /([A-Za-z][A-Za-z0-9\/-]*?)\(([^)]+)\)/g;

                  for (var i = 0; i < lines.length; i++) {
                    var line = lines[i];
                    if (!line) continue;

                    // Skip header/separators
                    if (/^\s*Group\s+Port-channel\s+Protocol\s+Ports\s*$/i.test(line)) continue;
                    if (/^\s*-+\s*$/.test(line)) continue;

                    var m = line.match(reGroup);
                    if (m) {
                      currentPo = 'Po' + m[2];
                      currentFlags = trim(m[3] || '');
                      currentProtocol = trim(m[4] || '');

                      if (currentProtocol !== '-') continue;

                      var portsPart = m[5] || '';
                      var mt;
                      rePortToken.lastIndex = 0;
                      while ((mt = rePortToken.exec(portsPart)) !== null) {
                        addMember(currentPo, mt[1]);
                      }

                      continue;
                    }

                    // Continuation line: only meaningful if we're inside a mode-on block.
                    if (!currentPo || currentProtocol !== '-') continue;

                    var portsOnly = String(line);
                    var mt2;
                    rePortToken.lastIndex = 0;
                    while ((mt2 = rePortToken.exec(portsOnly)) !== null) {
                      addMember(currentPo, mt2[1]);
                    }
                  }

                  return JSON.stringify({data: data});
          item_prototypes:
            - uuid: 8f7e6d5c4b3a4f2e9d8c7b6a5f4e3d2c
              name: 'Member {#IFNAME} down on {#PO} (mode on)'
              type: DEPENDENT
              key: 'etherchannel.modeon.member.down[{#PO},{#IFNAME}]'
              delay: '0'
              value_type: UNSIGNED
              master_item:
                key: 'ssh.run[etherchannel.summary,{HOST.CONN},{$SSH.PORT},utf8]'
              preprocessing:
                - type: JAVASCRIPT
                  parameters:
                    - |
                      // Returns 1 if {#IFNAME} is (D) on {#PO} while Po is Up (flag contains U) and Protocol is '-'. Else 0.

                      function trim(s) { return (s == null) ? '' : String(s).replace(/^\s+|\s+$/g, ''); }
                      var targetPo = '{#PO}';
                      var targetIf = '{#IFNAME}';

                      var text = value || '';
                      var lines = text.split(/\r?\n/);

                      var currentPo = null;
                      var currentFlags = '';
                      var currentProtocol = null;

                      var portsPart = '';

                      var reGroup = /^\s*(\d+)\s+Po(\d+)\(([^)]*)\)\s+(\S+)\s+(.*)$/;
                      var rePortToken = /([A-Za-z][A-Za-z0-9\/-]*?)\(([^)]+)\)/g;

                      function poUp(flags) {
                        return String(flags || '').indexOf('U') !== -1;
                      }

                      function checkPortsChunk(portsChunk) {
                        rePortToken.lastIndex = 0;
                        var m;
                        while ((m = rePortToken.exec(portsChunk)) !== null) {
                          var ifname = m[1];
                          var st = String(m[2] || '');
                          if (ifname === targetIf && st.indexOf('D') !== -1) return true;
                        }
                        return false;
                      }

                      for (var i = 0; i < lines.length; i++) {
                        var line = lines[i];
                        if (!line) continue;
                        if (/^\s*Group\s+Port-channel\s+Protocol\s+Ports\s*$/i.test(line)) continue;
                        if (/^\s*-+\s*$/.test(line)) continue;

                        var mg = line.match(reGroup);
                        if (mg) {
                          currentPo = 'Po' + mg[2];
                          currentFlags = trim(mg[3] || '');
                          currentProtocol = trim(mg[4] || '');
                          portsPart = mg[5] || '';
                        } else {
                          // continuation line
                          portsPart = String(line);
                        }

                        if (currentPo !== targetPo) continue;
                        if (currentProtocol !== '-') continue;
                        if (!poUp(currentFlags)) return 0;

                        if (checkPortsChunk(portsPart)) return 1;
                      }

                      return 0;
              tags:
                - tag: interface
                  value: '{#IFNAME}'
                - tag: portchannel
                  value: '{#PO}'
          trigger_prototypes:
            - uuid: 2c1b0a9f8e7d4c3b9a8f7e6d5c4b3a2f
              name: 'Interface {#IFNAME} Down - {#PO} (mode on)'
              expression: 'min(/Template Cisco PortChannel Member Monitoring/etherchannel.modeon.member.down[{#PO},{#IFNAME}],{$LINK.DOWN.DURATION})=1'
              event_name: '{HOST.HOST} Interface {#IFNAME} down - {#PO}'
              priority: AVERAGE
              manual_close: 'NO'
              tags:
                - tag: symptom
                  value: link-down
                - tag: interface
                  value: '{#IFNAME}'
                - tag: portchannel
                  value: '{#PO}'

        - uuid: 7c75e0702e00455d98777485f217e1a0
          name: Trunk port discovery (Cisco)
          type: SNMP_AGENT
          key: trunk.port.discovery
          delay: 5m
          description: |
            Discovers trunk ports using CISCO-VTP-MIB vlanTrunkPortTable.
            Triggers if the interface stays down (even if dynamic trunk status flips while down).
            Notes:
            - Works for standalone trunk ports.
            - PortChannel member links are handled by the LACP discovery above.
          snmp_oid: 'discovery[{#TRUNKSTATUS},1.3.6.1.4.1.9.9.46.1.6.1.1.14]'
          filter:
            evaltype: AND
            conditions:
              - macro: '{#TRUNKSTATUS}'
                value: '^1$'
                operator: MATCHES_REGEX
                formulaid: A
          item_prototypes:
            - uuid: 6b7c16c4f1c145c4905140ecb6b0fb93
              name: 'ifName ifIndex {#SNMPINDEX} (trunk discovery)'
              type: SNMP_AGENT
              key: 'ifName.trunk[{#SNMPINDEX}]'
              snmp_oid: '1.3.6.1.2.1.31.1.1.1.1.{#SNMPINDEX}'
              delay: 60s
              value_type: CHAR
              trends: '0'
              tags:
                - tag: Interface
                  value: '{#SNMPINDEX}'
                - tag: Role
                  value: trunk
              preprocessing:
                - type: REGEX
                  parameters:
                    - '^((Gi|Te|Fa|Eth|Hu|Fo|Tw|Twe|TenGigabitEthernet|GigabitEthernet|FastEthernet|Ethernet|Port-channel|Po).*)$'
                    - '\1'
                  error_handler: CUSTOM_VALUE
                  error_handler_params: ''
            - uuid: 175e7f1566a94d7cae373ce5bc3feba6
              name: 'Trunk status ifIndex {#SNMPINDEX}'
              type: SNMP_AGENT
              key: 'trunk.dynamicStatus[{#SNMPINDEX}]'
              snmp_oid: '1.3.6.1.4.1.9.9.46.1.6.1.1.14.{#SNMPINDEX}'
              delay: 5m
              value_type: UNSIGNED
              description: 'CISCO-VTP-MIB::vlanTrunkPortDynamicStatus (1=trunking, 2=notTrunking)'
              tags:
                - tag: Interface
                  value: '{#SNMPINDEX}'
                - tag: Role
                  value: trunk
            - uuid: 9b7a4a1cd9bf4a858edcb96967d91517
              name: 'PortChannel ifIndex (presence check) ifIndex {#SNMPINDEX}'
              type: SNMP_AGENT
              key: 'lacp.member.poifindex.trunk[{#SNMPINDEX}]'
              snmp_oid: '1.2.840.10006.300.43.1.2.1.1.12.{#SNMPINDEX}'
              delay: 60s
              value_type: UNSIGNED
              description: 'dot3adAggPortAttachedAggID. If >0, interface is part of an LACP PortChannel (used to suppress duplicate trunk alerts).'
              preprocessing:
